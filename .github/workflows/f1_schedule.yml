name: Update F1 Calendar (Weekly)

on:
  schedule:
    - cron: '0 0 * * 1' # Runs automatically every Monday at midnight UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests ics

      - name: Run F1 calendar script
        run: python generate_f1_calendar.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add f1_2026.ics
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update F1 matches (Weekly)" && git push)
