name: Update World Cup Calendar

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every 24 hours at midnight UTC
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests ics

      - name: Run calendar script
        run: python generate_calendar.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add world_cup_2026.ics
          # Only commit and push if the API detected changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update World Cup matches" && git push)
